
<mat-sidenav-container fullscreen>
  <mat-sidenav #sidenav>
    <mat-list (click)="sidenav.close()">
      <mat-list-item role="button" routerLink="posts">Posts</mat-list-item>
      <mat-list-item role="button" routerLink="posts/addpost">Add Post</mat-list-item>
      <mat-list-item role="button" >Log Out</mat-list-item>

    </mat-list>
  </mat-sidenav>

  <mat-toolbar>
  <button matIconButton (click)="sidenav.open()">
    <mat-icon>menu</mat-icon>
  </button>
  </mat-toolbar>

  <div class="container">
    <div class="row">
      <div class="col-12">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</mat-sidenav-container>


@if ( _postservice.Spinner()) {
  <div class="spinner">
    <mat-spinner></mat-spinner>
  </div>
}
