
<h2 mat-dialog-title class="text-center text-danger fw-bold">
  Confirm Delete
</h2>

<div mat-dialog-content class="text-center py-3">
  <p class="mb-0 fs-5">Are you sure you want to delete this post?</p>
</div>

<div mat-dialog-actions class="d-flex justify-content-between">
  <button class="btn btn-outline-secondary px-4" (click)="OnClose(false)">
    Cancel
  </button>

  <button class="btn btn-danger px-4" (click)="OnClose(true)">
    Delete
  </button>
</div>
