
<mat-card class="example-card  h-100">
  <mat-card-header>
   <mat-card-title>{{post.title}}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    {{post.content}}
  </mat-card-content>

  <mat-card-actions [routerLink]="['posts', post.id]">
    <button mat-button>View Details</button>
  </mat-card-actions>
</mat-card>
