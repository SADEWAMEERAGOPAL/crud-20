<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">

            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0">
        {{ IsinEditmode ? 'Edit Post' : 'Create Post' }}
      </h5>

      <button mat-raised-button color="accent" routerLink="/posts">
        <mat-icon>home</mat-icon>
      </button>
    </div>
            <div class="card-body">
                  <form [formGroup]="postForm" (ngSubmit)="Addpost()">
    <div class="form-group">
        <label for="title">Title <sup>*</sup></label>
        <input type="text" class="form-control" formControlName="title">
    </div>

    <div class="form-group">
        <label for="content">Content <sup>*</sup></label>
        <textarea class="form-control" formControlName="content" placeholder="Text">
      
        </textarea>
    </div>

    <div class="form-group">
        <label for="Userid">Userid <sup>*</sup></label>
        <select class="form-control" formControlName="Userid">
         @for (id of Userid; track $index) {
           <option [value]="id">{{ id }}</option>
         }
</select>
    </div>

    @if(!IsinEditmode){
        <button class="btn btn-outline-primary btn-block">Add Post</button>
    }

    @if(IsinEditmode){
        <button class="btn btn-outline-primary  btn-block" type="button" (click)="UpdatePost()">update Post</button>
    }
    
</form>
            </div>
        </div>
       
    </div>
</div>
